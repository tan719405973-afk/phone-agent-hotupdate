/* ================= 长文模式（小说 / 长文）v0.4.4 ================= */
var LW_KEY = "pa_longwrite";
var lwState = { title:"未命名小说", chapters:[], updated:0 };
var lwSelId = null;
var lwAbort = null;
var lwEditTimer = null;

function lwLoad(){
  try{ var s = JSON.parse(localStorage.getItem(LW_KEY)||"null"); if(s && s.chapters){ lwState = s; } }catch(e){}
}
function lwSave(){
  lwState.updated = Date.now();
  try{ localStorage.setItem(LW_KEY, JSON.stringify(lwState)); }catch(e){ toast("保存失败："+(e&&e.message||e)); }
}
function lwWords(s){ return String(s||"").replace(/\s/g,"").length; }
function lwSplit(text, prev){
  var lines = String(text||"").split(/\r?\n/);
  var chapters = [];
  var cur = null;
  var autoN = 0;
  function heading(line){
    var m;
    if((m = line.match(/^#{1,3}\s+(.+)$/))) return { title:m[1].trim(), raw:line, md:true };
    if(/^第[一二三四五六七八九十百千零0-9]+章.*$/.test(line)) return { title:line.trim() };
    if(/^Chapter\s+\d+.*$/i.test(line)) return { title:line.trim() };
    if(/^第[一二三四五六七八九十百千零0-9]+回.*$/.test(line)) return { title:line.trim() };
    if(/^[卷部篇][一二三四五六七八九十百千零0-9]+.*$/.test(line)) return { title:line.trim() };
    if(/^[一二三四五六七八九十百千零0-9]+、[^\n]{0,30}$/.test(line)) return { title:line.trim() };
    if(/^\d{1,3}[.、][^\n]{0,30}$/.test(line)) return { title:line.trim() };
    if(/^\d{1,3}\.\d{1,3}[^\n]{0,30}$/.test(line)) return { title:line.trim() };
    return null;
  }
  function pushCur(){ if(cur && (cur.text.trim()!=="" || cur.title)){ chapters.push(cur); } }
  for(var i=0;i<lines.length;i++){
    var line = lines[i];
    var hm = line.match(/^===$/);
    var dm = line.match(/^(?:---|\*\*\*|___)$/);
    var hd = heading(line);
    if(hd){
      pushCur();
      cur = { id: uid("ch"), title: hd.title, text:"", autoTitle:false };
      if(hd.md){ cur.md = true; cur.raw = hd.raw; }
    } else if(hm){
      pushCur(); autoN++; cur = { id: uid("ch"), title:"第"+autoN+"部分", text:"", autoTitle:true, sep:"===", sepChar:"===" };
    } else if(dm){
      pushCur(); autoN++; cur = { id: uid("ch"), title:"第"+autoN+"部分", text:"", autoTitle:true, sep:true, sepChar:line.trim() };
    } else {
      if(!cur){ cur = { id: uid("ch"), title:"（正文）", text:"", autoTitle:true }; }
      cur.text += (cur.text? "\n":"") + line;
    }
  }
  pushCur();
  if(!chapters.length){ chapters.push({ id: uid("ch"), title:"（正文）", text:String(text||""), autoTitle:true }); }
  if(prev && prev.length){
    var used = {};
    chapters.forEach(function(c){
      var hit = prev.filter(function(p){ return !used[p.id] && p.text===c.text && p.title===c.title && !!p.sep===!!c.sep && p.autoTitle===c.autoTitle && !!p.md===!!c.md; })[0];
      if(hit){ c.id = hit.id; used[hit.id]=true; }
    });
  }
  return chapters;
}
function lwToText(st){
  return (st.chapters||[]).map(function(c){
    if(c.sep) return (c.sepChar||"===") + "\n" + c.text;
    if(c.md) return c.raw + "\n" + c.text;
    if(!c.autoTitle) return c.title + "\n" + c.text;
    return c.text;
  }).join("\n\n");
}
function openLongWrite(){
  lwLoad();
  document.getElementById("lwTitle").value = lwState.title || "未命名小说";
  document.getElementById("lwEditor").value = lwToText(lwState);
  lwSelId = null; lwRenderOutline(); show("longWritePanel");
}
function lwClose(){ hide("longWritePanel"); }
function lwOnTitle(){ lwState.title = (document.getElementById("lwTitle").value||"").trim() || "未命名小说"; lwSave(); }
function lwOnEdit(){
  clearTimeout(lwEditTimer);
  lwEditTimer = setTimeout(function(){
    lwState.chapters = lwSplit(document.getElementById("lwEditor").value, lwState.chapters);
    if(lwSelId && !lwState.chapters.some(function(c){return c.id===lwSelId;})) lwSelId=null;
    lwRenderOutline(); lwSave();
  }, 600);
}
function lwChapterOffset(id){
  var acc = 0;
  for(var i=0;i<lwState.chapters.length;i++){
    var c = lwState.chapters[i];
    if(c.id===id) return acc;
    var seg = (c.sep? (c.sepChar||"===")+"\n" : (!c.autoTitle? (c.md? c.raw+"\n" : c.title+"\n") : "")) + c.text;
    acc += seg.length + (i<lwState.chapters.length-1? 2 : 0);
  }
  return -1;
}
function lwRenderOutline(){
  var box = document.getElementById("lwOutline");
  if(!lwState.chapters.length){ box.innerHTML = '<div class="lw-empty">还没有内容。粘贴全文，或点「新建」后撰写。</div>'; return; }
  box.innerHTML = lwState.chapters.map(function(c, i){
    var sel = (c.id===lwSelId)? " sel":"";
    return '<div class="lw-ch'+sel+'" draggable="true" data-id="'+c.id+'" onclick="lwSelect(\''+c.id+'\')" ondragstart="lwDragStart(event)" ondragover="lwDragOver(event)" ondrop="lwDrop(event)">'+
      '<span class="lw-ch-no">'+(i+1)+'</span>'+
      '<span class="lw-ch-title">'+esc(c.title||"（无标题）")+'</span>'+
      '<span class="lw-ch-wc">'+lwWords(c.text)+'字</span>'+
      '<span class="lw-ch-del" onclick="event.stopPropagation();lwDel(\''+c.id+'\')">✕</span>'+
    '</div>';
  }).join("");
}
function lwSelect(id){
  lwSelId = id;
  var ta = document.getElementById("lwEditor");
  var off = lwChapterOffset(id);
  if(off>=0){ try{ ta.focus(); ta.setSelectionRange(off, off); }catch(e){} }
  lwRenderOutline();
}
function lwDel(id){
  lwState.chapters = lwState.chapters.filter(function(c){return c.id!==id;});
  if(lwSelId===id) lwSelId=null;
  document.getElementById("lwEditor").value = lwToText(lwState);
  lwRenderOutline(); lwSave();
}
function lwNew(){
  if(lwState.chapters.length && !confirm("新建会清空当前未导出的内容，确定？")) return;
  lwState = { title:"未命名小说", chapters:[], updated:0 };
  document.getElementById("lwTitle").value="未命名小说";
  document.getElementById("lwEditor").value="";
  lwSelId=null; lwRenderOutline(); lwSave();
}
function lwImport(){ document.getElementById("lwFile").click(); }
function lwOnFile(e){
  var f = e.target.files && e.target.files[0]; if(!f) return;
  var rd = new FileReader();
  rd.onload = function(){
    var txt = String(rd.result||"");
    lwState.title = (f.name||"未命名小说").replace(/\.[^.]+$/,"");
    document.getElementById("lwTitle").value = lwState.title;
    document.getElementById("lwEditor").value = txt;
    lwState.chapters = lwSplit(txt); lwSelId=null; lwRenderOutline(); lwSave();
    toast("已导入 "+f.name);
  };
  rd.readAsText(f); e.target.value="";
}
function lwExport(){
  var txt = lwToText(lwState);
  if(!txt.trim()){ toast("没有可导出的内容"); return; }
  var name = (lwState.title||"未命名小说")+".txt";
  var a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([txt], {type:"text/plain;charset=utf-8"}));
  a.download = name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function(){ try{ URL.revokeObjectURL(a.href); }catch(e){} }, 1000);
  toast("已导出 "+name);
}
var lwDragId = null;
function lwDragStart(e){ lwDragId = e.currentTarget.getAttribute("data-id"); e.dataTransfer.effectAllowed="move"; }
function lwDragOver(e){ e.preventDefault(); }
function lwDrop(e){
  e.preventDefault();
  var toId = e.currentTarget.getAttribute("data-id");
  if(!lwDragId || lwDragId===toId) return;
  var from = lwState.chapters.filter(function(c){return c.id===lwDragId;})[0];
  if(!from) return;
  lwState.chapters = lwState.chapters.filter(function(c){return c.id!==lwDragId;});
  var idx = lwState.chapters.findIndex(function(c){return c.id===toId;});
  if(idx<0) lwState.chapters.push(from); else lwState.chapters.splice(idx,0,from);
  lwDragId=null;
  document.getElementById("lwEditor").value = lwToText(lwState);
  lwRenderOutline(); lwSave();
}
function lwSetGen(on){
  document.getElementById("lwBtnCont").style.display = on?"none":"inline-block";
  document.getElementById("lwBtnRew").style.display = on?"none":"inline-block";
  document.getElementById("lwBtnStop").style.display = on?"inline-block":"none";
}
function lwGenerate(prompt, sysText, onChunk, onDone){
  if(lwAbort){ try{ lwAbort.abort(); }catch(e){} }
  var ac = new AbortController(); lwAbort = ac;
  var acc = "";
  /* 【修复 v0.4.7】长文模式原走 WebView 原生 fetch，手机 file:// 下被跨域拦截（报"网络被拦截"）。
      改走 fetchTimeout → 原生桥（与生图/聊天同一通道），用 parseSSEStream 解析整段 SSE 体。 */
  fetchTimeout(apiBase()+"/chat/completions",{
    method:"POST",
    headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+currentApiKey() },
    timeout: 240000,
    body: JSON.stringify({ model:currentModel("text"), stream:true, messages:[{role:"system",content:sysText},{role:"user",content:prompt}] })
  }).then(function(resp){
    if(!resp.ok) return resp.text().then(function(t){ throw new Error("HTTP "+resp.status+" "+t.slice(0,160)); });
    return resp.text();
  }).then(function(fullBody){
    parseSSEStream(fullBody, function(delta){ acc+=delta; onChunk&&onChunk(delta, acc); });
    onDone(acc);
  }).catch(function(err){
    if(err && (err.name==="AbortError"||/abort/i.test(err.message||""))){ onDone(acc, null, true); return; }
    onDone(acc, err);
  });
}
function lwContinue(){
  if(!lwState.chapters.length){ toast("先写点或导入正文"); return; }
  var ctx = lwState.chapters.slice(-3).map(function(c){return (c.autoTitle?"":c.title+"\n")+c.text;}).join("\n\n");
  var instr = (document.getElementById("lwInstr").value||"").trim();
  var sys = "你是一位专业小说续写助手。保持原文文风、人称与时态，紧接上文情节自然推进，不要重复已有内容，不要添加任何解释、标题或前缀，直接输出续写的纯正文。";
  var prompt = "小说《"+(lwState.title||"未命名")+"》最近内容：\n\n"+ctx+"\n\n"+(instr?("续写要求："+instr+"\n"):"请续写下一章。")+"只输出续写正文。";
  var st = document.getElementById("lwStatus"); st.textContent = "续写中…"; lwSetGen(true);
  lwGenerate(prompt, sys, function(d, acc){ st.textContent = "续写中…（"+lwWords(acc)+"字）"; }, function(acc, err, aborted){
    lwSetGen(false);
    if(err){ st.textContent = "⚠️ "+friendlyErr(err); return; }
    var gen = (acc||"").trim();
    if(!gen){ st.textContent = "未生成内容"; return; }
    lwState.chapters.push({ id:uid("ch"), title:"（续写）", text:gen, autoTitle:true });
    document.getElementById("lwEditor").value = lwToText(lwState);
    lwRenderOutline(); lwSave();
    st.textContent = "已续写 "+lwWords(gen)+" 字";
  });
}
function lwRewrite(){
  if(!lwSelId){ toast("先在左侧选中要改写的章节"); return; }
  var ch = lwState.chapters.filter(function(c){return c.id===lwSelId;})[0];
  if(!ch){ toast("章节不存在"); return; }
  var instr = (document.getElementById("lwInstr").value||"").trim() || "润色这段文字，保持原意";
  var sys = "你是一位专业小说编辑。根据用户要求改写给定章节，保持文风一致，只输出改写后的完整章节正文，不要解释或加标题。";
  var prompt = "请改写以下章节：\n\n"+(ch.autoTitle?"":ch.title+"\n")+ch.text+"\n\n改写要求："+instr+"\n只输出改写后的完整章节内容。";
  var st = document.getElementById("lwStatus"); st.textContent = "改写中…"; lwSetGen(true);
  lwGenerate(prompt, sys, function(d, acc){ st.textContent="改写中…（"+lwWords(acc)+"字）"; }, function(acc, err){
    lwSetGen(false);
    if(err){ st.textContent="⚠️ "+friendlyErr(err); return; }
    var gen=(acc||"").trim();
    if(!gen){ st.textContent="未生成内容"; return; }
    ch.text = gen;
    document.getElementById("lwEditor").value = lwToText(lwState);
    lwRenderOutline(); lwSave();
    st.textContent = "已改写 "+lwWords(gen)+" 字";
  });
}
function lwStop(){ if(lwAbort){ try{ lwAbort.abort(); }catch(e){} lwAbort=null; document.getElementById("lwStatus").textContent="已停止"; lwSetGen(false); } }

(async function init(){
  CFG = await loadCfg();   /* F34：异步解密本地配置（含加密 Key） */
  ensureInit();
  applyTheme();
  applyBg();
  renderConvList(); renderMsgs(); updateTitle();
  updateOnline();          /* F17：离线状态条 */
  window.addEventListener("offline", function(){ updateOnline(); toast("网络已断开，发送可能失败"); });
  window.addEventListener("online", function(){ updateOnline(); toast("网络已恢复"); });

  silentCheckUpdate();       /* F35：启动静默检查热更新 */
  if(!localStorage.getItem(GUIDE_KEY)){ try{ showGuide(); }catch(e){} }  /* F38：首次打开弹新手引导 */
  var input=document.getElementById("input");
  input.addEventListener("keydown",function(e){
    if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); onSend(); }
  });
})();
