<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>agnes · 全模态 AI 个人助手</title>
<style>
  /* ============ agnes 深色霓虹设计 token（青→紫 135° 渐变，去微信绿/白底） ============ */
  :root{
    /* 品牌强调 */
    --primary:#00E5FF;
    --secondary:#8B5CF6;
    --grad:linear-gradient(135deg,#00E5FF,#8B5CF6);
    --glow-cyan:rgba(0,229,255,0.45);
    --glow-violet:rgba(139,92,246,0.40);

    /* 深色背景层级 */
    --bg:#0A0E17;            /* 全屏基底 */
    --bg-elev:#121826;       /* 分组/表面 */
    --bg-2:#1A2233;          /* 卡片/抽屉/浮层 */
    --card:#1A2233;

    /* 输入/按钮底色（深） */
    --input:#1E2738;

    /* 文字 */
    --text:#EAF2FF;
    --text-1:#EAF2FF;
    --text-2:#9AA7BD;
    --text-3:#566073;

    /* 分隔线 */
    --line:rgba(255,255,255,0.08);
    --line-strong:rgba(255,255,255,0.16);

    /* 语义色（深色取亮值） */
    --danger:#F87171;
    --success:#34D399;

    /* 气泡 */
    --agent-bubble:var(--grad);
    --agent-bubble-text:#0A0E17;
    --user-bubble:rgba(234,242,255,0.07);
    --user-bubble-border:rgba(255,255,255,0.10);

    /* 兼容别名（JS 内联样式可能引用，皆映射到霓虹/深色，避免破版） */
    --green:var(--primary);
    --green-press:var(--secondary);
    --white:var(--bg-2);
    --bubble-bg:var(--agent-bubble);
    --bubble-user-bg:var(--user-bubble);
    --accent:var(--primary);

    --safe-top:0px;
    --safe-bottom:0px;
    --font-scale:1;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;}
  body{
    background:#05070d;display:flex;align-items:center;justify-content:center;
    color:var(--text);font-size:calc(16px * var(--font-scale, 1));
  }
  /* 手机屏模拟外框（电脑上预览像个 App；真机全屏时自动铺满） */
  #phone{
    position:relative;width:100%;max-width:400px;height:100vh;max-height:860px;
    background:var(--bg);overflow:hidden;display:flex;flex-direction:column;
    box-shadow:0 0 60px rgba(0,0,0,0.6);
  }
  @media (max-width:420px){ #phone{max-height:none;height:100vh;} }

  /* ============ 顶部栏 ============ */
  .topbar{
    flex:0 0 auto;height:52px;background:rgba(10,14,23,0.82);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;padding:0 6px;
    padding-top:var(--safe-top);z-index:30;
  }
  .topbar .tb-btn{
    width:44px;height:44px;border:none;background:none;display:flex;align-items:center;
    justify-content:center;cursor:pointer;border-radius:8px;color:var(--text);
  }
  .topbar .tb-btn:active{background:rgba(255,255,255,0.06);}
  .topbar .tb-title{font-size:17px;font-weight:600;flex:1;text-align:center;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px;color:var(--text);}
  .icon{width:24px;height:24px;display:block;}
  .icon path,.icon line,.icon circle,.icon rect,.icon polyline{stroke:var(--text);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}

  /* ============ 消息区 ============ */
  .msgs{flex:1 1 auto;overflow-y:auto;padding:14px 12px 4px;-webkit-overflow-scrolling:touch;background:var(--bg);}
  .row{display:flex;margin-bottom:16px;align-items:flex-start;}
  .row.user{flex-direction:row-reverse;}
  .avatar{flex:0 0 auto;width:38px;height:38px;border-radius:50%;display:flex;
    align-items:center;justify-content:center;font-size:18px;font-weight:700;
    background:var(--grad);color:var(--agent-bubble-text);box-shadow:0 0 12px var(--glow-cyan);}
  .row.user .avatar{background:var(--grad);color:var(--agent-bubble-text);box-shadow:0 0 12px var(--glow-cyan);}
  .bubble{
    max-width:74%;margin:0 10px;padding:10px 13px;border-radius:6px;line-height:1.5;
    background:var(--agent-bubble);color:var(--agent-bubble-text);word-break:break-word;white-space:pre-wrap;position:relative;font-size:15.5px;
    box-shadow:0 0 18px rgba(0,229,255,0.22);
  }
  .row.user .bubble{background:var(--agent-bubble);color:var(--agent-bubble-text);box-shadow:0 0 18px rgba(0,229,255,0.22);}
  .bubble img,.bubble video{max-width:100%;border-radius:4px;display:block;margin-top:2px;}
  .bubble .cap{font-size:12.5px;color:inherit;opacity:.7;margin-top:6px;}
  .bubble .media-actions{display:flex;gap:14px;margin-top:8px;}
  .bubble .media-actions a{font-size:13px;color:var(--primary);text-decoration:none;cursor:pointer;}
  .gen-request{display:flex;flex-direction:column;gap:6px;}
  .gen-badge{align-self:flex-start;display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:600;background:rgba(0,229,255,0.12);color:var(--primary);border:1px solid rgba(0,229,255,0.25);}
  .gen-badge.gen-video{background:rgba(139,92,246,0.12);color:#a78bfa;border-color:rgba(139,92,246,0.25);}
  .gen-badge.gen-imageEdit{background:rgba(236,72,153,0.12);color:#f472b6;border-color:rgba(236,72,153,0.25);}
  .gen-prompt{font-size:15px;line-height:1.5;}
  .gen-meta{font-size:12px;color:var(--text-3);display:flex;gap:10px;flex-wrap:wrap;}
  .typing{display:inline-block;}
  .typing .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:rgba(10,14,23,0.45);
    margin:0 2px;animation:blink 1.2s infinite;}
  .typing .dot:nth-child(2){animation-delay:.2s;} .typing .dot:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,60%,100%{opacity:.25;}30%{opacity:1;}}
  .empty-tip{text-align:center;color:var(--text-3);font-size:13.5px;margin:40px 16px;line-height:1.9;}

  /* ============ 输入栏 ============ */
  .inputbar{
    flex:0 0 auto;background:rgba(10,14,23,0.82);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-top:1px solid var(--line);
    padding:8px 8px calc(8px + var(--safe-bottom));display:flex;align-items:flex-end;gap:8px;z-index:30;
  }
  .inputbar .ib-btn{width:38px;height:38px;flex:0 0 auto;border:none;background:rgba(255,255,255,0.05);border-radius:8px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);padding:0;}
  .inputbar .ib-btn:active{background:rgba(255,255,255,0.10);}
  .inputbar textarea{
    flex:1 1 auto;resize:none;border:none;background:rgba(255,255,255,0.06);border-radius:8px;
    padding:9px 12px;font-size:15.5px;line-height:1.4;max-height:100px;font-family:inherit;outline:none;overflow:hidden;
    color:var(--text);caret-color:var(--primary);
  }
  .inputbar textarea::placeholder{color:var(--text-2);}
  .inputbar .send{background:var(--grad);color:#0A0E17;border:none;border-radius:8px;padding:0 16px;
    height:38px;flex:0 0 auto;font-size:15px;cursor:pointer;box-shadow:0 0 18px rgba(0,229,255,0.30);font-weight:600;}
  .inputbar .send:active{opacity:.88;}
  .inputbar .send:disabled{opacity:.5;box-shadow:none;}
  .inputbar .send.stopping{background:var(--danger);color:#fff;box-shadow:none;}
  .inputbar .send.stopping:active{background:#dc2626;}
  .inputbar .send.guide{background:var(--grad);}
  /* F13/F14 待发送附件区 */
  .attach-zone{flex:0 0 auto;display:flex;flex-wrap:wrap;gap:6px;padding:6px 10px 0;
    background:var(--bg-2);border-top:1px solid var(--line);}
  .atchip{display:inline-flex;align-items:center;gap:5px;max-width:200px;
    background:var(--input);border:1px solid var(--line);border-radius:14px;
    padding:4px 10px;font-size:13px;color:var(--text);}
  .atchip b{color:var(--danger);cursor:pointer;font-weight:700;font-size:15px;line-height:1;padding:0 2px;}
  .atchip-static{display:inline-block;background:var(--input);border:1px solid var(--line);
    border-radius:10px;padding:2px 8px;font-size:12px;color:var(--text-2);margin:2px 4px 0 0;}
  .att-img{max-width:140px;max-height:140px;border-radius:8px;margin:4px 4px 0 0;object-fit:cover;
    border:1px solid var(--line);background:var(--input);display:inline-block;vertical-align:top;}
  /* 引用条（长按消息→引用，发送时把引用内容一起带给 AI） */
  .quote-bar{flex:0 0 auto;display:none;align-items:center;gap:8px;
    background:var(--bg-elev);border:1px solid var(--line);border-left:3px solid var(--primary);
    border-radius:8px;padding:6px 10px;margin:0 10px;font-size:13px;color:var(--text-2);
    max-width:calc(100% - 20px);}
  .quote-bar .qb-ic{color:var(--primary);font-size:15px;flex:0 0 auto;}
  .quote-bar .qb-txt{flex:1 1 auto;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .quote-bar .qb-x{flex:0 0 auto;color:var(--text-3);font-size:18px;line-height:1;cursor:pointer;padding:0 2px;}
  .quoted-chip{display:inline-block;background:var(--bg-elev);border-left:3px solid var(--primary);
    border-radius:4px;padding:2px 8px;margin:0 0 4px 0;font-size:12px;color:var(--text-2);
    max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .filecard{display:flex;align-items:center;gap:10px;background:var(--bg-elev);border:1px solid var(--line);
    border-radius:8px;padding:8px 10px;max-width:240px;margin-top:2px;}
  .filecard .fi{font-size:24px;flex:0 0 auto;line-height:1;}
  .filecard .fm{min-width:0;}
  .filecard .fn{font-size:14px;color:var(--text);word-break:break-all;}
  .filecard .fs{font-size:12px;color:var(--text-3);margin-top:2px;}

  /* ============ 抽屉 / 遮罩 ============ */
  .mask{position:fixed;inset:0;background:rgba(5,8,14,0.62);opacity:0;pointer-events:none;
    transition:opacity .25s;z-index:20;}
  .mask.show{opacity:1;pointer-events:auto;}
  .drawer{position:absolute;top:0;bottom:0;left:0;width:78%;max-width:300px;background:var(--bg-2);
    transform:translateX(-100%);transition:transform .25s;z-index:30;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
  .drawer.show{transform:translateX(0);}
  .drawer-head{padding:calc(16px + var(--safe-top)) 16px 12px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;}
  .drawer-head b{font-size:17px;color:var(--text);}
  .drawer-head .newconv{background:var(--grad);color:#0A0E17;border:none;border-radius:16px;
    padding:6px 12px;font-size:13px;cursor:pointer;font-weight:600;box-shadow:0 0 16px rgba(0,229,255,0.25);}
  .conv-list{flex:1;overflow-y:auto;}
  .conv-item{padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer;position:relative;border-left:2px solid transparent;}
  .conv-item.active{background:rgba(0,229,255,0.08);border-left-color:var(--primary);}
  .conv-item .cname{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
  .conv-item .cprev{font-size:12.5px;color:var(--text-3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .conv-item .cops{position:absolute;right:10px;top:12px;display:flex;gap:2px;}
  .conv-item .cops button{border:none;background:none;font-size:12px;color:var(--text-3);
    padding:4px 6px;cursor:pointer;border-radius:6px;}
  .conv-item .cops button:active{background:rgba(255,255,255,0.06);}

  /* ============ 设置页（整屏滑入） ============ */
  .page{position:absolute;inset:0;background:var(--bg);transform:translateX(100%);
    transition:transform .25s;z-index:40;display:flex;flex-direction:column;}
  .page.show{transform:translateX(0);}
  .page-head{flex:0 0 auto;height:52px;background:rgba(10,14,23,0.82);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-bottom:1px solid var(--line);
    display:flex;align-items:center;padding:0 6px;padding-top:var(--safe-top);z-index:30;}
  .page-head .back{width:44px;height:44px;border:none;background:none;display:flex;align-items:center;
    justify-content:center;cursor:pointer;color:var(--text);}
  .page-head .pt{font-size:17px;font-weight:600;color:var(--text);}
  .page-body{flex:1;overflow-y:auto;padding-bottom:calc(30px + var(--safe-bottom));background:var(--bg);}
  .group{margin-top:18px;}
  .group .gt{font-size:13px;color:var(--text-3);padding:6px 16px;}
  .cell{background:var(--bg-elev);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--line);cursor:pointer;gap:12px;}
  .cell:active{background:rgba(255,255,255,0.04);}
  .cell .cl{font-size:15.5px;color:var(--text);}
  .cell .cr{font-size:14px;color:var(--text-3);display:flex;align-items:center;gap:6px;max-width:60%;
    justify-content:flex-end;text-align:right;}
  .cell .cr .chev{width:16px;height:16px;}
  .cell .cr .chev path{stroke:var(--text-3);}
  .cell input[type=text],.cell input[type=password]{border:none;text-align:right;font-size:14px;
    outline:none;background:none;color:var(--text-2);width:100%;}
  /* 竖排字段：标签在上、输入框占满整行左对齐，长地址可完整显示 */
  .cell.field{display:block;cursor:default;}
  .cell.field .cl{display:block;margin-bottom:8px;color:var(--text);font-size:14px;}
  .cell.field .cr{max-width:100%;width:100%;display:block;}
  .cell.field input[type=text],.cell.field input[type=password]{
    text-align:left;border:1px solid var(--line);border-radius:8px;padding:10px 12px;
    background:var(--input);color:var(--text);width:100%;box-sizing:border-box;}
  .cell.danger .cl{color:var(--danger);}
  .cell select{border:none;background:none;font-size:14px;color:var(--text-2);outline:none;}

  /* ============ 弹层 toast / 对话框 ============ */
  #toast{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);
    color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:100;opacity:0;
    pointer-events:none;transition:opacity .2s;max-width:80%;text-align:center;}
  #toast.show{opacity:1;}
  .dlg-mask{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;display:none;
    align-items:center;justify-content:center;}
  .dlg-mask.show{display:flex;}
  .dlg{background:var(--bg-2);border-radius:12px;width:80%;max-width:300px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
  .dlg .dh{padding:20px 20px 8px;font-size:16px;font-weight:600;text-align:center;color:var(--text);}
  .dlg .db{padding:0 20px 16px;font-size:14px;color:var(--text-2);text-align:center;line-height:1.6;}
  .dlg .di{margin:0 20px 16px;width:calc(100% - 40px);border:1px solid var(--line);border-radius:8px;
    padding:10px;font-size:15px;outline:none;background:var(--input);color:var(--text);}
  .dlg .df{display:flex;border-top:1px solid var(--line);}
  .dlg .df button{flex:1;border:none;background:none;padding:13px;font-size:16px;cursor:pointer;}
  .dlg .df button.cancel{color:var(--text-2);border-right:1px solid var(--line);}
  .dlg .df button.ok{color:var(--primary);font-weight:600;}
  .dlg .df button.ok.danger{color:var(--danger);}

  /* 创作二级页里的模式选择 */
  .seg{display:flex;background:rgba(255,255,255,0.06);border-radius:8px;margin:14px 16px 0;padding:3px;}
  .seg button{flex:1;border:none;background:none;padding:8px;font-size:14px;border-radius:6px;cursor:pointer;color:var(--text-2);}
  .seg button.on{background:var(--bg-2);color:var(--text);font-weight:600;}

  /* 设置页下拉框（主题/保存位置） */
  .cell .cr select{font-size:14px;color:var(--text);border:1px solid var(--line);border-radius:6px;padding:4px 6px;background:var(--input);max-width:160px;}

  /* 创作页参考图 */
  .refbox{display:flex;flex-wrap:wrap;gap:8px;padding:6px 0;}
  .refthumb{position:relative;width:56px;height:56px;border-radius:8px;overflow:hidden;border:1px solid var(--line);}
  .refthumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .refthumb .rm{position:absolute;top:1px;right:1px;width:18px;height:18px;line-height:16px;text-align:center;
    background:rgba(0,0,0,.55);color:#fff;border-radius:50%;font-size:14px;cursor:pointer;}
  .addref{margin:4px 0 8px;border:1px dashed var(--line);background:var(--input);color:var(--text-2);
    border-radius:8px;padding:8px 12px;font-size:14px;cursor:pointer;}

  .dl{display:inline-block;margin-top:6px;background:var(--primary);color:#0A0E17;border:none;border-radius:6px;padding:5px 12px;font-size:13px;text-decoration:none;font-weight:600;}

  select{font-size:14px;max-width:100%;border:1px solid var(--line);border-radius:6px;padding:6px 8px;background:var(--input);color:var(--text);font-family:inherit;}
  .cell select{margin-left:8px;}
  .api-card{display:flex;align-items:center;gap:12px;background:var(--bg-2);border:1.5px solid var(--line);border-radius:12px;padding:14px;margin:0 16px 10px;cursor:pointer;}
  .api-card.api-cur{border-color:var(--primary);background:rgba(0,229,255,0.08);}
  .api-icon{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-2);flex:0 0 auto;}
  .api-info{flex:1 1 auto;min-width:0;}
  .api-name{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
  .api-tag{font-size:11px;color:#888;border:1px solid #ddd;border-radius:4px;padding:1px 6px;}
  .api-url{font-size:12px;color:var(--text-3);margin-top:3px;word-break:break-all;}
  .api-actions{display:flex;gap:8px;}
  .api-actions button{background:var(--input);border:none;border-radius:6px;padding:5px 10px;font-size:13px;color:var(--text);cursor:pointer;}
  .api-actions button.danger{color:var(--danger);}

  /* 长按操作菜单（底部上滑） */
  .actionsheet{position:absolute;left:0;right:0;bottom:0;background:var(--bg-2);z-index:60;
    transform:translateY(100%);transition:transform .25s;padding-bottom:var(--safe-bottom);box-shadow:0 -8px 32px rgba(0,0,0,0.5);}
  .actionsheet.show{transform:translateY(0);}
  .actionsheet .as-item{padding:16px;text-align:center;font-size:16px;color:var(--text);
    border-bottom:1px solid var(--line);cursor:pointer;}
  .actionsheet .as-item:active{background:rgba(255,255,255,0.04);}
  .actionsheet .as-item.danger{color:var(--danger);}
  .actionsheet .as-cancel{margin-top:6px;background:var(--bg-2);padding:16px;text-align:center;
    font-size:16px;font-weight:600;color:var(--text-2);cursor:pointer;}

  /* 离线提示条 */
  #offlineBar{position:absolute;top:52px;left:0;right:0;background:var(--danger);color:#fff;
    font-size:13px;text-align:center;padding:8px;z-index:15;display:none;}

  /* 加载中可取消 / 失败可重试 链接 */
  .bubble .gen-actions{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;}
  .bubble .gen-actions a{font-size:13px;color:var(--primary);text-decoration:none;cursor:pointer;}

  /* 崩溃日志页 */
  .crash-item{background:var(--bg-elev);border-bottom:1px solid var(--line);padding:12px 16px;}
  .crash-item .ct{font-size:12px;color:var(--text-3);}
  .crash-item .cm{font-size:13px;color:var(--text);margin-top:4px;word-break:break-word;white-space:pre-wrap;}
  .crash-empty{text-align:center;color:var(--text-3);font-size:13px;margin:40px 16px;}
  .summary-row{justify-content:center;}
  .summary-note{background:var(--input);color:var(--text-2);font-size:12px;line-height:1.6;padding:8px 12px;border-radius:10px;max-width:88%;text-align:left;}

  /* 长按禁止 iOS 文字选择气泡，但允许选中文字自由复制 */
  .bubble{ -webkit-touch-callout:none; -webkit-user-select:text; user-select:text; }
  /* 代码块（F42）：AI 回复里的代码/提示词带复制按钮 */
  .codeblock{ position:relative; background:#0d1117; border:1px solid var(--line); border-radius:8px; margin:6px 0; overflow:hidden; }

  .rt{ white-space:pre-wrap; word-break:break-word; }
  /* 预览大图/视频（F43） */
  .preview-mask{ position:fixed; inset:0; background:rgba(0,0,0,.92); display:none; align-items:center; justify-content:center; z-index:999; }
  .preview-mask.show{ display:flex; }
  .preview-box{ max-width:96vw; max-height:92vh; display:flex; flex-direction:column; align-items:center; }
  .preview-box img{ max-width:96vw; max-height:80vh; object-fit:contain; border-radius:6px; }
  .preview-actions{ margin-top:12px; }
  .preview-actions a{ color:#fff; background:rgba(255,255,255,.16); padding:8px 18px; border-radius:20px; font-size:14px; margin:0 6px; display:inline-block; }

  /* ===== agnes 品牌增强（ABCD + 5处结构对齐） ===== */
  /* 顶栏品牌 + 在线状态点 */
  .tb-title-wrap{ display:flex;align-items:center;justify-content:center;flex:1;min-width:0;gap:6px; }
  .tb-brand{ font-weight:700;letter-spacing:.3px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent; }
  .status-dot{ width:8px;height:8px;border-radius:50%;background:var(--primary);
    box-shadow:0 0 0 0 rgba(0,229,255,0.6); animation:agnesPulse 2s infinite; flex:0 0 auto; }
  @keyframes agnesPulse{ 0%{box-shadow:0 0 0 0 rgba(0,229,255,0.55);} 70%{box-shadow:0 0 0 7px rgba(0,229,255,0);} 100%{box-shadow:0 0 0 0 rgba(0,229,255,0);} }

  /* 渐变箭头发送键（圆形，默认箭头 / 生成中显「停止」） */
  .inputbar .send{ width:40px;height:40px;border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center;
    color:transparent;font-size:0; }
  .inputbar .send::after{ content:""; width:0;height:0; border-left:9px solid #0A0E17;
    border-top:6px solid transparent; border-bottom:6px solid transparent; }
  .inputbar .send.stopping{ color:#fff;font-size:15px; }
  .inputbar .send.stopping::after{ display:none; }

  /* 气泡淡入（科技质感） */
  .row{ animation:agnesFade .26s ease both; }
  @keyframes agnesFade{ from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
  .row.summary-row{ animation:none; }

  /* 演示状态条 */
  .demo-bar{ display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:12px;color:var(--text-2);
    background:rgba(0,229,255,0.05);border-bottom:1px solid var(--line); }
  .demo-bar .dot{ width:7px;height:7px;border-radius:50%;background:var(--text-3);flex:0 0 auto; }
  .demo-bar.online .dot{ background:var(--success); box-shadow:0 0 8px rgba(52,211,153,0.6); }
  .demo-bar .txt{ flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }

  /* 设置页图标行 + 工作室强调 */
  .cell .ci{ font-size:17px;width:22px;text-align:center;flex:0 0 auto; }
  .cell .ci:empty{ display:none; }
  .cell.studio-row{ background:linear-gradient(135deg, rgba(0,229,255,0.10), rgba(139,92,246,0.12)); }
  .cell.studio-row .cl{ background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:600; }

  /* 工作室步骤指示 */
  .studio-steps{ display:flex;gap:6px;padding:4px 16px 12px; }
  .studio-steps .st{ flex:1;text-align:center;font-size:11px;color:var(--text-3);padding:8px 2px;border-radius:8px;
    border:1px solid var(--line);background:var(--bg-2); }
  .studio-steps .st .n{ display:block;font-size:15px;font-weight:700;margin-bottom:3px; }

var qrcode = function() {

  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      _modules[_moduleCount - 8][8] = (!test);
    };

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        while (true) {

      var unicodeMap = {};
      while (true) {
        var b0 = bin.read();
        if (b0 == -1) break;
        var b1 = read();
        var b2 = read();
        var b3 = read();
        var k = String.fromCharCode( (b0 << 8) | b1);
        var v = (b2 << 8) | b3;
        unicodeMap[k] = v;
        count += 1;

      if (count != numChars) {
        throw count + ' != ' + numChars;
      }

      return unicodeMap;

    return function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        if (c < 128) {
          bytes.push(c);
        } else {

              bytes.push(b & 0xff);
            }

          }
        }

/* API 地址工具（取自当前选中的接口） */
function currentApi(){
  var apis = CFG && CFG.apis;
  if(!apis || !apis.length) return makeDefaultApi();
  var id = CFG.currentApiId;
  var a = apis.find(function(x){return x.id===id;}) || apis[0];
  return a;
}
function currentApiKey(){ return currentApi().key||""; }
function apiBase(){ return (currentApi().baseUrl||"").replace(/\/+$/,""); }
function currentModel(kind){ var m = (currentApi().models||{})[kind]; if(m && m.trim()) return m.trim(); return MODEL_DEFAULTS[kind]||""; }
/* 官方推荐的默认模型（用户没填/填空时兜底，避免“模型乱填”导致功能失效） */
var MODEL_DEFAULTS = { text:"agnes-2.0-flash", image:"agnes-image-2.1-flash", imageEdit:"agnes-image-2.0-flash", video:"agnes-video-v2.0" };
/* 模型名容错：把常见简写/漏写 -flash 的补全成官方正式名；认不出时原样返回 */
function normalizeModel(name){
  if(!name) return "";
  var s = String(name).trim().toLowerCase().replace(/\s+/g,"");
  var map = {
    "agnes-image-2.0": "agnes-image-2.0-flash",
    "agnes-image-2.1": "agnes-image-2.1-flash",
    "agnes-image-2.0flash": "agnes-image-2.0-flash",
    "agnes-image-2.1flash": "agnes-image-2.1-flash",
    "image-2.0": "agnes-image-2.0-flash",
    "image-2.1": "agnes-image-2.1-flash"
  };
  if(map[s]) return map[s];
  if(/^agnes-image-2\.0$/.test(s)) return "agnes-image-2.0-flash";
  if(/^agnes-image-2\.1$/.test(s)) return "agnes-image-2.1-flash";
  return name.trim();
}
function makeDefaultApi(id){
  return { id:id||"agnes-default", name:"Agnes", icon:"A", baseUrl:"https://apihub.agnes-ai.com/v1", key:"",
           models:{text:"agnes-2.0-flash", image:"agnes-image-2.1-flash", imageEdit:"agnes-image-2.0-flash", video:"agnes-video-v2.0"},
           modelsList:["agnes-2.0-flash","agnes-2.5-flash","agnes-image-2.0-flash","agnes-image-2.1-flash","agnes-video-v2.0"],
           routable:true, parseFiles:false };
}
/* 图像/视频生成始终走「可路由」的供应商（默认 Agnes），避免切到只做对话的 BigModel 时生图崩 */
function mediaApi(){
  var list = (CFG && CFG.apis) || [];
  var r = list.filter(function(a){return a.routable;})[0];
  return r || currentApi();
}
function mediaApiBase(){ return (mediaApi().baseUrl||"").replace(/\/+$/,""); }
function mediaApiKey(){ return mediaApi().key||""; }
/* 找支持文件解析的供应商（BigModel 等，需已填 key） */
function parseProvider(){
  var list = (CFG && CFG.apis) || [];
  return list.filter(function(a){return a.parseFiles && a.key;})[0] || null;
}
/* BigModel 文件解析（lite 异步）：上传 → 轮询结果 → 返回正文文本 */
function parseFileWithProvider(file, provider){
  var base = (provider.baseUrl||"").replace(/\/+$/,"");
  var fd = new FormData();
  fd.append("file", file);
  fd.append("tool_type", "lite");
  return fetch(base+"/files/parser/create", { method:"POST", headers:{ "Authorization":"Bearer "+provider.key }, body: fd })
    .then(function(r){ if(!r.ok) throw new Error("解析上传 HTTP "+r.status); return r.json(); })
    .then(function(j){
      var tid = (j&&j.task_id) || (j&&j.data&&j.data.task_id) || "";
      if(!tid) throw new Error("未返回解析任务 ID");
      return pollParse(provider, tid);
    });
}
function pollParse(provider, tid){
  var base = (provider.baseUrl||"").replace(/\/+$/,"");
  var url = base+"/files/parser/result/"+tid+"/text";
  function attempt(n){
    if(n>25) return Promise.reject(new Error("解析超时（请稍后重试）"));
    return fetch(url, { headers:{ "Authorization":"Bearer "+provider.key } }).then(function(r){ return r.text(); }).then(function(t){
      var txt = extractParseText(t);
      if(txt) return txt;
      return new Promise(function(res){ setTimeout(function(){ res(attempt(n+1)); }, 1500); });
    });
  }
  return attempt(0);
}
function extractParseText(t){
  if(!t || !String(t).trim()) return "";
  try{
    var j = JSON.parse(t);
    if(typeof j === "string") return j;
    if(j && typeof j === "object"){
      if(j.text) return j.text;
      if(j.data && j.data.text) return j.data.text;

function downloadUrl(url, name){

      if(_uri && _uri.indexOf("err:")!==0){ toast("已保存到相册"); } else { _fallbackDownload(url, name); }

    toast("正在下载…");

    if(r.indexOf("ok:")===0){ toast("已保存到相册"); return; }

    fetchTimeout(url, _hdrs, 30000)
      .then(function(r){ return r.blob(); })
      .then(function(b){
        var rd = new FileReader();
        rd.onload = function(){
          try{
            var ext = (name && name.indexOf(".")>0) ? name.split(".").pop().replace(/[^a-z0-9]/gi,"") : "bin";

/* F17：带超时的 fetch（超时即抛错，便于区分「超时」与「网络不通」） */
var __nativeHttpCb = {};
var __nativeHttpId = 0;
function nativeFetch(url, opts){
  opts = opts || {};
  return new Promise(function(resolve, reject){
    if(!hasNative() || !window.NativeBridge || !window.NativeBridge.httpRequestAsync || !/^https?:\/\//i.test(url)){
      fetch(url, opts).then(resolve).catch(reject);
      return;
    }
    var id = "__nh"+(++__nativeHttpId);
    var ms = opts.timeout || ((opts.method && opts.method.toUpperCase() !== "GET") ? 120000 : 30000);
    var t = setTimeout(function(){
      delete __nativeHttpCb[id];
      reject(new Error("请求超时（等待超过 "+(ms/1000)+" 秒），可能是网络慢或服务繁忙"));
    }, ms);
    __nativeHttpCb[id] = function(res){
      clearTimeout(t);
      delete __nativeHttpCb[id];
      var resp = {
        ok: res.status >= 200 && res.status < 300,
        status: res.status,
        text: function(){ return Promise.resolve(res.body || ""); },
        json: function(){ return new Promise(function(_res,_rej){ try{ _res(JSON.parse(res.body || "{}")); }catch(e){ _rej(e); } }); }
      };
      resolve(resp);
    };
    try {
      window.NativeBridge.httpRequestAsync(
        (opts.method || "GET").toUpperCase(),
        url,
        JSON.stringify(opts.headers || {}),
        opts.body || "",
        String(ms),
        id
      );
    } catch(e) {
      clearTimeout(t);
      delete __nativeHttpCb[id];
      reject(e);
    }
  });
}
function fetchTimeout(url, opts, ms){
  opts = opts || {};
  opts.timeout = ms;
  return nativeFetch(url, opts);
}
/* 原生桥 httpRequestAsync 返回的是「整段 SSE 响应体」（所有 data: 块已拼接），
   这里按行解析还原流式 delta，逐块回调 onDelta（保留打字机观感）。
   用于把聊天/长文等原本依赖 fetch().body.getReader() 的流式链路改走原生桥，
   以绕过手机 WebView 对 file:// 源跨域请求的外网拦截（原报错"网络被拦截"）。 */
function parseSSEStream(fullBody, onDelta){
  String(fullBody||"").split("\n").forEach(function(line){
    line = line.trim();
    if(line.indexOf("data:")!==0) return;
    var d = line.slice(5).trim();
    if(!d || d==="[DONE]") return;
    try{
      var j = JSON.parse(d);
      var delta = j.choices && j.choices[0] && j.choices[0].delta && j.choices[0].delta.content;
      if(delta) onDelta(delta);
    }catch(e){}
  });
}

/* ================= 存储（F34：本地加密） ================= */
/* 安全目标：localStorage 内不再存明文 API Key。
   真加密 = Web Crypto AES-GCM（需 secure context：https 或 localhost）。
   降级 = http 局域网预览下 crypto.subtle 不可用，退化为 Base64 编码（仅防明文，非强加密，APK/https 自动升级 AES）。 */
var ENC_AES = "__pa_aes__";
var ENC_B64 = "__pa_b64__";
var ENC_SALT = "phone-agent-salt-v1";
function hasCrypto(){ return !!(window.crypto && window.crypto.subtle); }
function b64enc(bytes){ var u=new Uint8Array(bytes), s=""; for(var i=0;i<u.length;i++) s+=String.fromCharCode(u[i]); return btoa(s); }
function b64dec(b64){ var s=atob(b64); var u=new Uint8Array(s.length); for(var i=0;i<s.length;i++)u[i]=s.charCodeAt(i); return u; }
async function getCryptoKey(){
  var enc = new TextEncoder();
  var mat = await crypto.subtle.importKey("raw", enc.encode(ENC_SALT+"::"+(navigator.userAgent||"web")), {name:"PBKDF2"}, false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2", salt: enc.encode(ENC_SALT), iterations:100000, hash:"SHA-256"},
    mat, {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]);
}
async function encryptStr(plain){
  if(hasCrypto()){
    var key = await getCryptoKey();
    var iv = crypto.getRandomValues(new Uint8Array(12));
    var ct = await crypto.subtle.encrypt({name:"AES-GCM", iv:iv}, key, new TextEncoder().encode(plain));
    return ENC_AES + b64enc(iv) + "::" + b64enc(ct);
  }
  return ENC_B64 + btoa(unescape(encodeURIComponent(plain)));
}
async function decryptStr(cipher){
  if(cipher.indexOf(ENC_AES)===0){
    var parts = cipher.slice(ENC_AES.length).split("::");
    var key = await getCryptoKey();
    var pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64dec(parts[0])}, key, b64dec(parts[1]));
    return new TextDecoder().decode(pt);
  }
  if(cipher.indexOf(ENC_B64)===0){
    return decodeURIComponent(escape(atob(cipher.slice(ENC_B64.length))));
  }
  return cipher;
}

  var txt = conv.messages.filter(function(m){return m.type==="text" && m.text;}).slice(-20)
    .map(function(m){ return (m.role==="user"?"用户":"助手")+"："+m.text; }).join("\n");
  if(txt.length < 30){ done&&done(); return; }
  var prompt = "请总结以下对话中值得长期记住的信息（用户身份/偏好/正在做的项目/待办/关键结论），用 3-5 条中文要点，每条一行，不要序号、不要任何解释或引号：\n\n"+txt;
  fetchTimeout(apiBase()+"/chat/completions",{
    method:"POST", headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+currentApiKey() },
    body: JSON.stringify({ model:currentModel("text"), stream:false, messages:[{role:"user", content:prompt}] })
  }, 60000).then(function(r){ if(!r.ok) throw 0; return r.json(); }).then(function(j){
    var s = j.choices && j.choices[0] && j.choices[0].message && j.choices[0].message.content;
    if(s){ s = String(s).trim(); loadMem();
      MEM.entries.unshift({ id: uid("mem"), ts: Date.now(), conv: conv.name||"对话", convId: conv.id, summary: s });

/* F13/F14：把 AI 的文本回复下载成文件（改写后的文档 / 提取的 JSON 等） */
function downloadMsg(id){
  var c = current(); if(!c) return;
  var m = null;
  for(var i=0;i<c.messages.length;i++){ if(c.messages[i].id===id){ m=c.messages[i]; break; } }
  if(!m) return;
  var txt = m.text || "";
  var name = (m.fileResult && m.fileResult.name) || "回复.txt";
  if(/^[[{]/.test(txt.trim())){
    try{ JSON.parse(txt.trim()); if(!/\.json$/i.test(name)) name = name.replace(/\.[^.]+$/,"")+".json"; }catch(e){}
  }
  downloadText(name, txt);
}
function downloadText(name, text){
  try{
    var text = String(text);
    var ext = (name && name.indexOf(".")>0) ? name.split(".").pop().replace(/[^a-z0-9]/gi,"") : "txt";
    /* APK 内：直接把文本写成 dataURL 走原生桥落地 */
    if(hasNative()){
      var dataUrl = "data:text/plain;charset=utf-8;base64," + btoa(unescape(encodeURIComponent(text)));
      var uri = NativeBridge.saveMedia(dataUrl, ext);
      if(uri && uri.indexOf("err:")!==0){ toast("已保存到本地"); return; }
    }
    var blob = new Blob([text], {type:"text/plain;charset=utf-8"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 120);
  }catch(e){ toast("下载失败："+ (e && e.message ? e.message : e)); }
}

function onSend(){
  if(activeAbort){ var t=document.getElementById("input").value.trim(); if(t){ onGuideInput(); } else { stopGenerate(); } return; }   /* 生成中：有字=引导改道，无字=停止 */
  var el = document.getElementById("input");
  var text = el.value.trim();
  if(!text && pendingAttachments.length === 0) return;
  if(!currentApiKey()){
    toast("当前接口未填 API Key：设置 → API 接口管理 → 编辑接口");
    return;
  }
  /* 收集待发送附件，随文字一并提交（F13/F14） */
  var atts = pendingAttachments.slice();
  /* 引用内容并入：照片→参考图、文件→带内容、文字/视频→前缀 */
  var quotePrefix = "";
  if(quotedMsg){
    if(quotedMsg.type === "image"){
      atts.push({ name:"引用图片", mime:"image", kind:"image", url: quotedMsg.media.url, _quoted:true });
    } else if(quotedMsg.type === "file"){
      var fc = (quotedMsg.media && quotedMsg.media.content) || (quotedMsg.attachments && quotedMsg.attachments[0] && quotedMsg.attachments[0].content);
      if(fc) atts.push({ name:(quotedMsg.media && quotedMsg.media.name) || "引用文件", mime:"text/plain", kind:"text", content:fc, _quoted:true });
    } else if(quotedMsg.type === "text"){
      quotePrefix = "（引用：「" + (quotedMsg.text||"").slice(0,200) + "」）\n";
    } else if(quotedMsg.type === "video"){
      quotePrefix = "（引用视频：" + ((quotedMsg.media && quotedMsg.media.url) || "") + "）\n";
    }
  }
  var qMeta = quotedMsg ? quoteSummary(quotedMsg) : null;
  var route = routeIntent(text);
  if(route === "image?"){
    showActionSheet([
      {label:"🎨 生图", onclick:function(){ dispatchRoute("image", text, atts, cleanPrompt(text,"image"), qMeta); }},
      {label:"💬 聊天", onclick:function(){ dispatchRoute("chat", text, atts, cleanPrompt(text,"chat"), qMeta); }}
    ]);
    return;
  }
  var prompt = cleanPrompt(text, route);
  prompt = quotePrefix + prompt;

  /* 纯图片无文字：询问用途，避免默认走聊天/视觉理解 */
  if(!text && atts.length && atts.every(function(a){return a.kind==="image";})){
    var _atts = atts, _qMeta = qMeta, _prompt = prompt;
    var _imgN = _atts.filter(function(a){return a.kind==="image";}).length;
    showActionSheet([
      {label:"🎨 按这 "+_imgN+" 张图生图（多图参考）", onclick:function(){ dispatchRoute("image", "", _atts, _prompt, _qMeta); }},
      {label:"🎬 按这 "+_imgN+" 张图生视频", onclick:function(){ dispatchRoute("video", "", _atts, _prompt, _qMeta); }},
      {label:"💬 描述/分析图片", onclick:function(){ dispatchRoute("chat", "", _atts, _prompt, _qMeta); }}
    ]);
    return;
  }
  if(!text && atts.length) route = "chat";          /* 纯附件 → 走对话线处理 */
  dispatchRoute(route, text, atts, prompt, qMeta);
}

/* F43：把一段对话文本总结成中文要点（复用 Agnes 文本模型） */
function summarizeText(text){
  return new Promise(function(res){
    fetchTimeout(apiBase()+"/chat/completions",{
      method:"POST", headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+currentApiKey() },
      body: JSON.stringify({ model:currentModel("text"), stream:false, messages:[{role:"user", content:"用 3-5 条中文要点总结以下对话的核心信息（用户需求/偏好/结论/待办），每条一行，不要序号、解释或引号：\n\n"+text}] })
    }, 60000).then(function(r){ if(!r.ok) throw 0; return r.json(); }).then(function(j){
      var s = j.choices && j.choices[0] && j.choices[0].message && j.choices[0].message.content;
      res(s ? String(s).trim() : "");

/* F43：单会话超长时，把较早消息总结为一条摘要消息（置于开头），保留最近若干条，继续聊 */
async function maybeCompactCurrent(){
  if(!currentApiKey()) return;
  var c = current(); if(!c) return;
  var txt = c.messages.filter(function(m){return m.type==="text";});
  if(txt.length <= CONV_COMPACT_AT) return;
  /* 【修复 v0.4.3】用户上传的文件（附件含正文）必须保留，绝不被总结或剔除，
     否则几轮对话后"开头发的文件"被压成摘要、后续"改文件"会丢失原文 */
  var fileIds = {};
  txt.forEach(function(m){
    if(m.role==="user" && m.attachments && m.attachments.some(function(a){return a.kind!=="image" && a.content;})) fileIds[m.id]=true;
  });
  var old = txt.slice(0, txt.length - CONV_KEEP_RECENT).filter(function(m){ return !fileIds[m.id]; });
  var src = old.map(function(m){
    if(m.role==="summary") return "（更早摘要）"+m.text;
    return (m.role==="user"?"用户":"助手")+"："+m.text;
  }).join("\n");
  if(src.length < 60) return;
  toast("对话较长，正在总结历史消息…");
  try{
    var sum = await summarizeText(src);
    if(!sum) return;
    var oldIds = old.map(function(m){return m.id;});
    c.messages = c.messages.filter(function(m){ return oldIds.indexOf(m.id) < 0; });
    c.messages.unshift({ id:uid("msg"), role:"summary", type:"text", text:sum, _summary:true, createdAt:Date.now() });
    c.updatedAt = Date.now();
    saveConvs(); renderMsgs(); renderConvList();
    toast("已总结较早的对话，继续聊～");
  }catch(e){}
}
async function dispatchRoute(route, text, atts, prompt, qMeta){
  await maybeCompactCurrent();
  var meta = atts.map(function(a){
    var m = { name:a.name, mime:a.mime, kind:a.kind, size:a.size, content:a.content };
    if(a.kind === "image"){ m.url = a.url; m.base64 = a.base64; }
    return m;
  });
  appendMessage({role:"user", type:"text", text: text || ("[附件：" + atts.map(function(a){return a.name;}).join(", ") + "]"), attachments: meta, quoted: qMeta });
  renderMsgs(); renderConvList();
  pendingAttachments = []; renderAttachZone();
  var el = document.getElementById("input"); el.value = ""; autoGrow(el);
  clearQuote();   /* 引用内容已并入 atts/prompt，清除全局引用态 */
  if(route === "image"){
    var imgRefs = atts.filter(function(a){return a.kind==="image";}).map(function(a){return a.url;});
    return doImage(prompt, imgRefs, CFG.genParams);
  }
  if(route === "video"){
    var vRefs = atts.filter(function(a){return a.kind==="image";}).map(function(a){return a.url;});
    return doVideo(prompt, vRefs, CFG.genParams);
  }
  return doChat(prompt, atts);
}

/* 极简意图路由（前端粗判，真正规划由线①做；这里先给可见的三线分流） */
function routeIntent(t){
  var s = t;
  /* 反向保护：用户在讨论/询问/抱怨图片或视频，不是请求生成 */
  var negImg = /(没有|无|不是|别|不要|拒|怎么|为什么|为何|哪里|在哪|看不到|下载|保存|点开|打开|失败|错误|出错|429).{0,5}(图片|图像|图|海报|logo|插画)/i;
  var negImg2 = /(图片|图像|图|海报|logo|插画).{0,5}(没有|无|不是|别|不要|拒|怎么|为什么|为何|哪里|在哪|看不到|下载|保存|点开|打开|失败|错误|出错|429)/i;
  var negVid = /(没有|无|不是|别|不要|拒|怎么|为什么|为何|哪里|在哪|看不到|下载|保存|点开|打开|失败|错误|出错|429).{0,5}(视频|短片|动画|动图|宣传片|mv)/i;
  var negVid2 = /(视频|短片|动画|动图|宣传片|mv).{0,5}(没有|无|不是|别|不要|拒|怎么|为什么|为何|哪里|在哪|看不到|下载|保存|点开|打开|失败|错误|出错|429)/i;
  if(negImg.test(s) || negImg2.test(s) || negVid.test(s) || negVid2.test(s)) return "chat";
  /* 正向：明确请求生成图片/视频（必须带动作意图，单独名词如"图片"不触发） */

  if(/^(生视频|生成视频|做视频|制作视频|做段视频|做个视频|来段视频|来段短片|来段动画|短片|动画|视频片段|生成一段|生成短片|来个视频|做个短片|变视频|转视频|转成视频|视频一下|动起来|动图|做宣传片|做mv|做动画|做短片|生成mv|生成宣传片|生成动画|给我视频|给我短片|给我动画|给我宣传片|给我mv|我要视频|我要短片|我要动画|我要宣传片|我要mv|做段视频|做段短片|做段动画|给我做段|帮我做段|生成段|来段|变段|转段|给我来个视频|给我来段视频|我要一个视频|做一个视频|生成一个视频|做一个短片|生成一个短片|整一段|整一个视频|搞一段|搞一个视频|弄一段|弄一个视频)/i.test(s)) return "video";
  /* 高置信：纯画面描述且带尺寸标注（如「群像七仙女 1792x1024」）→ 直接生图，不再被当聊天糊弄 */
  if(/\d{3,4}\s*[xX×]\s*\d{3,4}/.test(s)) return "image";
  /* 中置信：像画面描述但无明确动作/疑问 → 交 UI 弹菜单确认（不静默当聊天） */
  if(looksLikeArtPrompt(s)) return "image?";

/* ---- 线① 文本对话（流式打字机 F22）+ F13/F14 附件处理 ---- */
function doChat(text, attachments){
  attachments = attachments || [];
  var c = current();
  var allTxt = c.messages.filter(function(m){return m.type==="text";});
  var summaryMsg = allTxt.filter(function(m){return m.role==="summary";})[0];
  /* 【修复 v0.4.3】重建上下文时把用户上传的文件正文重新注入，并"钉住"文件消息，
     使其永不因 slice(-12) 或压缩被丢弃——否则"开头发的文件"几轮后就改不了 */
  function isFileMsg(m){ return m.role==="user" && m.attachments && m.attachments.some(function(a){return a.kind!=="image" && a.content;}); }
  function msgToApi(m){
    if(isFileMsg(m)){
      var parts = [{ type:"text", text: ((m.text && m.text.indexOf("[附件")!==0) ? m.text+"\n" : "") || "（请处理我上传的附件）" }];
      m.attachments.forEach(function(a){
        if(a.kind==="image"){ if(a.base64) parts.push({type:"image_url", image_url:{url:a.base64}}); }
        else if(a.content){ parts.push({ type:"text", text:"\n\n【用户上传的文件："+a.name+"】\n```\n"+String(a.content).slice(0,40000)+"\n```" }); }
      });
      return {role:"user", content: parts};
    }
    return {role: m.role==="user"?"user":"assistant", content: m.text};
  }
  /* 历史消息（不含本轮刚发的用户消息，它走下方 userContent 单独发送，避免重复注入） */
  var histMsgs = allTxt.slice(0, -1);
  var fileMsgs = histMsgs.filter(isFileMsg);
  var convTail = histMsgs.filter(function(m){return !isFileMsg(m);}).slice(-12);
  var pinned = fileMsgs.filter(function(m){return convTail.indexOf(m) < 0;});
  var recent = pinned.concat(convTail).map(msgToApi);
  var sysParts = [];
  if(summaryMsg) sysParts.push("【对话更早部分摘要，供参考】\n"+summaryMsg.text);
  var _memCtx = buildMemoryContext(text);
  if(_memCtx) sysParts.push(MEM_SYS_PROMPT + "\n" + _memCtx);
  var hist = recent;
  if(sysParts.length) hist = [{role:"system", content: sysParts.join("\n\n")}].concat(hist);
  var aiMsg = appendMessage({role:"assistant", type:"text", text:""});
  renderMsgs();
  var rowBubble = function(){ var r=document.querySelector('.row[data-mid="'+aiMsg.id+'"] .bubble'); return r; };
  var b = rowBubble(); if(b) b.innerHTML='<span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';

  var textAtts = attachments.filter(function(a){return a.kind==="text";});
  var imgAtts  = attachments.filter(function(a){return a.kind==="image";});
  var binAtts  = attachments.filter(function(a){return a.kind==="binary";});

  var binParses = binAtts.map(parseBinAtt);
  if(binAtts.length && parseProvider()) toast("正在解析 "+binAtts.length+" 个文件…");
  Promise.all(imgAtts.map(ensureImageBase64).concat(binParses)).then(function(results){
    var imgB64s = results.slice(0, imgAtts.length);
    var parsedBin = results.slice(imgAtts.length);
    var userContent;
    if(attachments.length){
      var parts = [{ type:"text", text: text || "（请处理我上传的附件）" }];
      textAtts.forEach(function(a){
        parts.push({ type:"text", text:"\n\n【用户上传的文件："+a.name+"】\n```\n"+(a.content||"").slice(0,40000)+"\n```" });
      });
      imgB64s.forEach(function(b64){
        if(b64) parts.push({ type:"image_url", image_url:{ url:b64 } });
      });
      binAtts.forEach(function(a, i){
        var txt = parsedBin[i];
        if(txt && txt.trim()){
          parts.push({ type:"text", text:"\n\n【用户上传的文件（已解析）："+a.name+"】\n```\n"+txt.slice(0,40000)+"\n```" });
        } else {
          parts.push({ type:"text", text:"\n（注："+a.name+" 的内容无法读取，如需处理请把文字内容粘贴发我；在「API 接口管理」添加并开启「文件解析」的智谱 BigModel 接口后可自动解析 PDF/Word/图片等）" });
        }
      });
      userContent = parts;
    } else {
      userContent = text || "（请继续）";
    }

    /* F20/F24：可打断 + 失败可重试 + 超时保护 */
    abortReason = null;
    var ac = new AbortController();
    activeAbort = ac; setGenState(true);
    var chatAcc = "";
    var chatTimer = setTimeout(function(){ if(activeAbort===ac){ abortReason="timeout"; try{ac.abort();}catch(e){} } }, 240000);

    /* 【修复 v0.4.7】聊天原走 WebView 原生 fetch，在手机 file:// 环境下被跨域拦截（报"网络被拦截"）。
        改走 fetchTimeout → 原生桥 httpRequestAsync（与生图同一通道），绕过 WebView CORS；
        原生桥返回整段 SSE 响应体，下方用 parseSSEStream 手动解析还原流式输出。 */
    fetchTimeout(apiBase()+"/chat/completions",{
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+currentApiKey() },
      timeout: 240000,
      body: JSON.stringify({ model:currentModel("text"), stream:true, messages: hist.concat([{role:"user", content:userContent}]) })
    }).then(function(resp){
      if(!resp.ok) return resp.text().then(function(t){ throw new Error("HTTP "+resp.status+" "+t.slice(0,120)); });
      return resp.text();
    }).then(function(fullBody){
      parseSSEStream(fullBody, function(delta){
        chatAcc+=delta; var bb=rowBubble(); if(bb) bb.textContent=chatAcc.replace(/^\s+/,""); scrollBottom();
      });
      finalizeChat(aiMsg, chatAcc, attachments);
    }).then(function(){
      clearTimeout(chatTimer); clearRetry(aiMsg.id);
    }).catch(function(err){
      clearTimeout(chatTimer);
      if(err && (err.name==="AbortError" || /abort/i.test(err.message||""))){
        var note = abortReason==="timeout" ? "\n\n（请求超时，已自动停止）"
                 : abortReason==="guide" ? "\n\n（已按新指令改写）"
                 : "\n\n（已停止生成）";
        finalizeChat(aiMsg, (chatAcc||"（已停止生成）")+note, attachments);
        return;
      }
      attachRetry(aiMsg.id, function(){ doChat(text, attachments); });
      aiMsg._err = true;
      finalizeChat(aiMsg, "⚠️ 出错了："+friendlyErr(err), attachments);
    }).then(function(){
      activeAbort = null; abortReason = null;
      if(pendingGuide){
        var g = pendingGuide; pendingGuide = null;
        setTimeout(function(){ doChat(g); }, 30);   /* 引导续写：半截已落历史，以引导语开新请求 */
        return;   /* 保持停止态，待 doChat 重新接管 */
      }
      setGenState(false);
    });
  }).catch(function(err){
    aiMsg._err = true;
    finalizeChat(aiMsg, "⚠️ 附件图片读取失败："+friendlyErr(err), attachments);
    activeAbort = null; abortReason = null; setGenState(false);
  });
}
function finalizeChat(aiMsg, txt, atts){
  txt = (txt||"").replace(/^\s+/,"") || "（无内容）";
  aiMsg.text = txt;
  /* F13/F14：带附件的请求，给结果标注可下载文件名 */
  if(atts && atts.length){
    var first = atts[0];
    var base = (first.name || "result").replace(/\.[^.]+$/, "");
    var ext  = ((first.name||"").match(/\.[^.]+$/)||[""])[0];
    var fname = /^[[{]/.test(txt.trim()) ? (base + "_result.json") : (base + "_已处理" + ext);
    aiMsg.fileResult = { name: fname };
  }
  saveConvs(); renderMsgs(); renderConvList();
}

/* ---- 线② 生图 F07 ----
   有参考图：优先直接图生图（传 image 参数），失败再回退两段管线
   无参考图：直接文生图 */
/* 加载图片真实尺寸（用于图生图比例差异检测，防拉伸） */
function loadImgDims(url){
  return new Promise(function(res){
    var im = new Image();
    im.onload = function(){ res({ w:im.naturalWidth, h:im.naturalHeight }); };
    im.onerror = function(){ res(null); };
    im.src = url;
  });
}
/* 比例差异（归一化：0=同比例，值越大差异越大） */
function ratioDiff(rw, rh, tw, th){
  if(!rw||!rh||!tw||!th) return 0;
  var r1 = rw/rh, r2 = tw/th;
  return Math.abs(r1-r2)/Math.min(r1, r2);
}
function doImage(prompt, refs, params){
  if(refs && refs.length){
    var _sz = (params && params.size) || "1024x1024";   /* 没选尺寸时按默认 1:1 比对 */
    var _wh = String(_sz).split("x");
    var tw = parseInt(_wh[0],10), th = parseInt(_wh[1],10);
    var loading = appendMessage({role:"assistant", type:"loading", text:"正在参考图片绘制…"});
    renderMsgs();
    Promise.all(refs.map(ensureImageBase64)).then(function(b64Refs){
      var validRefs = b64Refs.filter(function(x){ return x; });
      if(!validRefs.length) validRefs = refs; /* 转换失败时回退原 URL */
      loadImgDims(validRefs[0]).then(function(d){
        if(d){
          var dlt = ratioDiff(d.w, d.h, tw, th);
          if(dlt >= 0.5){
            /* 比例差异极大（竖图↔横图等）：直接图生图必拉伸，改走理解重绘 */
            loading.text = "参考图与输出比例差异大，已自动改走「理解重绘」避免拉伸…"; renderMsgs();
            doImageTwoStage(prompt, validRefs, params, loading);
            return;
          }
          if(dlt >= 0.2){
            /* 比例有差异：在提示词里强制要求保持主体比例、不拉伸 */
            prompt = prompt + "（注意：参考图比例为 "+d.w+":"+d.h+"，输出比例为 "+tw+":"+th+"，请保持画面主体/人物比例不变、不要拉伸变形，通过扩展或裁切背景来适配目标画幅）";
          }
        }
        genImageDirect(prompt, validRefs, params, loading);
      });
    }).catch(function(err){
      loading._err = true;
      replaceLoading(loading, "⚠️ 参考图读取失败："+friendlyErr(err));
    });
  } else {
    var loading2 = appendMessage({role:"assistant", type:"loading", text:"正在画图（默认调用图像模型）…"});
    renderMsgs();
    genImageOnly(prompt, loading2, null, params);
  }
}

/* 图生图专用模型解析：用户若把 2.1（仅文生图）误当图生图模型，或留空，强制回退到官方 2.0-flash */
function resolveImageEditModel(){
  var m = currentModel("imageEdit");
  if(m && /2\.1/.test(m)) return MODEL_DEFAULTS.imageEdit;   /* 2.1 不支持图生图，自动换 2.0 */
  return m || MODEL_DEFAULTS.imageEdit;
}
/* 直接图生图：把参考图作为 image 参数传给 /images/generations */
function genImageDirect(prompt, refs, params, loading){
  params = params || CFG.genParams || {};
  function tryWith(model){
    var ib = { model:model, prompt:prompt, size:(params.size||"1024x1024") };
    ib.extra_body = { image: refs, response_format: "url" };   /* 图生图：image 必须放 extra_body 内（数组），不能放顶层 */
    return fetchTimeout(mediaApiBase()+"/images/generations",{
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+mediaApiKey() },
      body: JSON.stringify(ib)
    }, 120000).then(function(r){
      if(!r.ok) return r.text().then(function(t){throw new Error("HTTP "+r.status+" "+t.slice(0,120));});
      return r.json();
    }).then(function(j){
      var url = j.data && j.data[0] && (j.data[0].url || j.data[0].b64_json);
      if(!url) throw new Error("未返回图片");
      if(j.data[0].b64_json) url = "data:image/png;base64,"+j.data[0].b64_json;
      removeMsg(loading.id); clearRetry(loading.id);
      landAndAppend("image", url, prompt, mediaExt(url));
    });
  }
  var m0 = resolveImageEditModel();
  tryWith(m0).catch(function(err){
    /* 图生图失败兜底：若用户配的模型不是官方 2.0-flash，自动用官方图生图模型再试一次（防“模型乱填”） */
    if(m0 !== MODEL_DEFAULTS.imageEdit){
      loading.text = "图生图模型不可用，自动切换到官方 2.0-flash 重试…"; renderMsgs();
      return tryWith(MODEL_DEFAULTS.imageEdit).catch(function(e2){
        loading.text = "直接绘制失败，改用参考图理解+重绘…"; renderMsgs();
        doImageTwoStage(prompt, refs, params, loading);
      });
    }
    /* 直接绘制失败：回退到两段管线（视觉理解 + 纯文生图） */
    loading.text = "直接绘制失败，改用参考图理解+重绘…";
    renderMsgs();
    doImageTwoStage(prompt, refs, params, loading);
  });
}

/* 两段管线：视觉模型读参考图 → 生成融合提示词 → 纯文生图 */
function doImageTwoStage(prompt, refs, params, loading){
  var content = [{ type:"text", text:
    "请仔细观察这 "+refs.length+" 张参考图，结合我的要求：「"+prompt+"」，"+
    "生成一段用于文生图模型的详细画面提示词（涵盖主体、风格、色调、构图、光影、细节）。"+
    "只输出提示词本身，不要任何解释、前缀或引号。" }];
  refs.forEach(function(u){ content.push({ type:"image_url", image_url:{ url:u } }); });
  fetchTimeout(apiBase()+"/chat/completions",{
    method:"POST",
    headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+currentApiKey() },
    body: JSON.stringify({ model:currentModel("text"), stream:false, messages:[{role:"user", content:content}] })
  }, 120000).then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error("HTTP "+r.status+" "+t.slice(0,120));});
    return r.json();
  }).then(function(j){
    var fused = j.choices && j.choices[0] && j.choices[0].message && j.choices[0].message.content;
    if(!fused) throw new Error("未能从参考图生成提示词");
    fused = String(fused).trim();
    loading.text = "已读参考图，正在按新提示词绘制…";
    renderMsgs();
    genImageOnly(fused, loading, prompt, params);   /* caption 仍显示用户原始描述 */
  }).catch(function(err){
    loading._err = true;
    attachRetry(loading.id, function(){ doImage(prompt, refs, params); });
    replaceLoading(loading, "⚠️ 参考图理解失败："+friendlyErr(err));
  });
}

/* 纯文生图（无参考图 / 两段管线第二段共用） */
function genImageOnly(prompt, loading, origPrompt, params){
  params = params || CFG.genParams || {};
  var ib = { model:currentModel("image"), prompt:prompt, size:(params.size||"1024x1024") };
  ib.extra_body = { response_format: "url" };   /* 官方要求 response_format 放 extra_body 内（不能放顶层） */
  fetchTimeout(mediaApiBase()+"/images/generations",{
    method:"POST",
    headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+mediaApiKey() },
    body: JSON.stringify(ib)
  }, 120000).then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error("HTTP "+r.status+" "+t.slice(0,120));});
    return r.json();
  }).then(function(j){
    var url = j.data && j.data[0] && (j.data[0].url || j.data[0].b64_json);
    if(!url) throw new Error("未返回图片");
    if(j.data[0].b64_json) url = "data:image/png;base64,"+j.data[0].b64_json;
    removeMsg(loading.id); clearRetry(loading.id);
    landAndAppend("image", url, (origPrompt||prompt), mediaExt(url));
  }).catch(function(err){
    loading._err = true;
    attachRetry(loading.id, function(){ genImageOnly(prompt, loading, origPrompt); });
    replaceLoading(loading, "⚠️ 画图失败："+friendlyErr(err));

}

/* ---- 线③ 生视频（异步轮询 F08） ---- */
function doVideo(prompt, refs, params){
  videoPollCancel = false;
  var loading = appendMessage({role:"assistant", type:"loading", text:"正在生成视频（约 1-3 分钟）…"});
  loading._cancelable = true; renderMsgs();
  Promise.all((refs || []).map(ensureImageBase64)).then(function(b64Refs){
    var validRefs = b64Refs.filter(function(x){ return x; });
    if(refs && refs.length && !validRefs.length) validRefs = refs;
    var body = { model:currentModel("video"), prompt:prompt };
    if(validRefs && validRefs.length) body.image = validRefs.length === 1 ? validRefs[0] : validRefs;   /* 图生视频：单图传字符串，多图传数组 */
    if(params && params.size && !(validRefs && validRefs.length)){ var _wh=String(params.size).split("x"); if(_wh.length===2){ if(parseInt(_wh[0],10)) body.width=parseInt(_wh[0],10); if(parseInt(_wh[1],10)) body.height=parseInt(_wh[1],10); } }   /* 视频用 width/height；图生视频不传宽高 */
    if(params && params.durationFrames){
      var _nf = Math.round(Number(params.durationFrames));
      if(_nf < 1) _nf = 25;
      _nf = Math.min(_nf, 441);                 /* 官方上限 441 */
      _nf = Math.round((_nf - 1) / 8) * 8 + 1;  /* 收敛到 8n+1（如 25=3×8+1） */
      body.num_frames = _nf; body.frame_rate = 24;   /* 时长：帧数(8n+1)÷帧率=秒 */
    }
    fetchTimeout(mediaApiBase()+"/videos",{
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+mediaApiKey() },
      body: JSON.stringify(body)
    }, 30000).then(function(r){
      if(!r.ok) return r.text().then(function(t){throw new Error("HTTP "+r.status+" "+t.slice(0,120));});
      return r.json();
    }).then(function(j){
      var vid = j.video_id || j.task_id || j.id || (j.data&&j.data.video_id);
      if(!vid) throw new Error("未返回 video_id");
      pollVideo(vid, loading, 0);
    }).catch(function(err){
      loading._err = true;
      attachRetry(loading.id, function(){ doVideo(prompt, refs, params); });
      replaceLoading(loading, "⚠️ 视频生成失败："+friendlyErr(err));
    });
  }).catch(function(err){
    loading._err = true;
    replaceLoading(loading, "⚠️ 参考图读取失败："+friendlyErr(err));
  });
}
function pollVideo(vid, loading, tries){
  if(videoPollCancel){ videoPollCancel=false; replaceLoading(loading,"（已取消视频生成）"); return; }
  if(tries>60){ loading._err=true; replaceLoading(loading,"⚠️ 视频生成超时，请稍后重试"); return; }
  /* 官方推荐结果查询端点：GET /agnesapi?video_id=<VIDEO_ID>（媒体 base 去掉 /v1 后拼接）；
     最终视频地址在 metadata.url（英文文档兼容 remixed_from_video_id），status∈queued/in_progress/completed/failed */
  var q = (mediaApiBase().replace(/\/v1$/,"") + "/agnesapi?video_id=" + encodeURIComponent(vid));
  fetchTimeout(q, { headers:{ "Authorization":"Bearer "+mediaApiKey() } })
  .then(function(r){ return r.json(); }).then(function(j){
    var url = (j && j.metadata && j.metadata.url) || (j && j.remixed_from_video_id) || (j && j.url) || (j && j.data && j.data.url) || (j && j.video_url);
    var status = (j && j.status) || (j && j.data && j.data.status);
    if(url){
      removeMsg(loading.id); clearRetry(loading.id);
      landAndAppend("video", url, "视频已生成", mediaExt(url));
    } else if(status==="failed"){
      loading._err=true; replaceLoading(loading,"⚠️ 视频生成失败");
    } else {
      setTimeout(function(){ pollVideo(vid, loading, tries+1); }, 3000);
    }
  }).catch(function(){
    setTimeout(function(){ pollVideo(vid, loading, tries+1); }, 3000);
  });
}

function parseStudioPlan(txt){
  if(!txt) return null;
  txt = String(txt).trim().replace(/^```[a-zA-Z]*\n?/,"").replace(/```$/,"").trim();
  var s = txt.indexOf("["), e = txt.lastIndexOf("]");
  if(s<0 || e<=s) return null;
  try{ var a = JSON.parse(txt.slice(s, e+1)); return Array.isArray(a)?a:null; }catch(err){ return null; }
}
function runStudio(){
  var theme = (document.getElementById("studioTheme")||{}).value;
  theme = theme ? theme.trim() : "";
  if(!theme){ toast("先写个主题"); return; }
  if(!currentApiKey()){ toast("请先在 API 接口管理里填入 Key"); return; }
  var shots = parseInt((document.getElementById("studioShots")||{}).value,10) || 3;
  var style = (document.getElementById("studioStyle")||{}).value || "";
  var params = CFG.genParams || {};
  hide('studioPage'); closeSettings();
  appendMessage({role:"user", type:"text", text:"[智能制片] "+theme});
  renderMsgs(); renderConvList();
  var loading = appendMessage({role:"assistant", type:"loading", text:"① 规划分镜中…"});
  renderMsgs();
  var planPrompt = "你是一位短片分镜导演。主题：「"+theme+"」"+(style?(" 风格倾向："+style):"")+"。请规划 "+shots+" 个分镜，只输出一个 JSON 数组（不要 markdown 代码块、不要任何解释），"+
    "每个元素结构：{\"shot\":\"分镜画面简述(中文)\",\"prompt\":\"用于文生图模型的英文详细提示词(主体/风格/色调/构图/光影/细节)\",\"video_prompt\":\"该分镜对应的视频动态描述(英文，含运镜与动作)\"}。";
  fetchTimeout(apiBase()+"/chat/completions",{
    method:"POST",
    headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+currentApiKey() },
    body: JSON.stringify({ model:currentModel("text"), stream:false, messages:[{role:"user", content:planPrompt}] })
  }, 120000).then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error("HTTP "+r.status+" "+t.slice(0,120));});
    return r.json();
  }).then(function(j){
    var txt = j.choices && j.choices[0] && j.choices[0].message && j.choices[0].message.content;
    var arr = parseStudioPlan(txt);
    if(!arr || !arr.length) throw new Error("分镜规划解析失败");
    loading.text = "② 逐镜出图（0/"+arr.length+"）"; renderMsgs();
    studioGenShots(arr, 0, loading, params, theme, style, []);
  }).catch(function(err){
    loading._err = true;
    attachRetry(loading.id, function(){ runStudio(); });
    replaceLoading(loading, "⚠️ 智能制片规划失败："+friendlyErr(err));
  });
}
function studioGenShots(arr, idx, loading, params, theme, style, shotUrls){
  shotUrls = shotUrls || [];
  if(idx >= arr.length){
    loading.text = "③ 合成视频中…"; renderMsgs();
    studioMakeVideo(arr, loading, params, theme, style, shotUrls);
    return;
  }
  var shot = arr[idx] || {};
  loading.text = "② 逐镜出图（"+(idx+1)+"/"+arr.length+"）："+(shot.shot || ("第"+(idx+1)+"镜"));
  renderMsgs();
  var prompt = shot.prompt || shot.shot || theme;
  fetchTimeout(mediaApiBase()+"/images/generations",{
    method:"POST",
    headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+mediaApiKey() },
    body: JSON.stringify({ model:currentModel("image"), prompt:prompt, size:(params.size||"1024x1024"), extra_body:{ response_format:"url" } })
  }, 120000).then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error("HTTP "+r.status+" "+t.slice(0,120));});
    return r.json();
  }).then(function(j){
    var url = j.data && j.data[0] && (j.data[0].url || j.data[0].b64_json);
    if(!url) throw new Error("分镜"+(idx+1)+"未返回图片");
    if(j.data[0].b64_json) url = "data:image/png;base64,"+j.data[0].b64_json;
    shotUrls.push(url);   /* 记住 studio 自己产出的帧，供后续视频参考（不再扫整段对话） */
    landAndAppend("image", url, "分镜"+(idx+1)+"："+(shot.shot||""), mediaExt(url));   /* 落本地，避免远程 URL 过期裂图 */
    studioGenShots(arr, idx+1, loading, params, theme, style, shotUrls);
  }).catch(function(err){
    appendMessage({role:"assistant", type:"text", text:"⚠️ 分镜"+(idx+1)+"出图失败："+friendlyErr(err)});
    renderMsgs(); renderConvList();
    studioGenShots(arr, idx+1, loading, params, theme, style, shotUrls);
  });
}
function studioMakeVideo(arr, loading, params, theme, style, shotUrls){
  var vprompt = theme + (style?("，"+style):"") + "；动态：" + arr.map(function(s){return s.video_prompt||"";}).filter(Boolean).join("；");
  removeMsg(loading.id);
  doVideo(vprompt, (shotUrls && shotUrls.length) ? shotUrls : [], params);   /* 用 studio 自己产出的帧，不扫整段对话 */
}

function removeMsg(id){
  var c=current(); if(!c) return;
  c.messages = c.messages.filter(function(m){return m.id!==id;});
  saveConvs();
}
function replaceLoading(loading, text){
  loading.type="text"; loading.text=text; saveConvs(); renderMsgs(); renderConvList();
}

/* ================= F13/F14 文件上传（统一走「待发送附件区」） ================= */
function pickFile(){ document.getElementById("fileInput").click(); }
function fileKind(f){
  var t = f.type || "";
  if(t.indexOf("image/") === 0) return "image";
  if(t.indexOf("text/") === 0) return "text";
  var ext = (f.name.split(".").pop() || "").toLowerCase();
  var textExt = ["txt","md","markdown","csv","json","xml","log","yml","yaml","ini","conf","js","ts","jsx","tsx","py","java","c","cpp","h","hpp","cs","go","rb","php","sh","bat","ps1","html","htm","css","scss","sql","tex","srt","vtt","toml","gitignore","env","csv"];
  if(textExt.indexOf(ext) >= 0) return "text";
  var imgExt = ["jpg","jpeg","png","gif","webp","bmp","heic","heif","avif"];
  if(imgExt.indexOf(ext) >= 0) return "image";
  return "binary";
}
function renderAttachZone(){
  var z = document.getElementById("attachZone");
  if(!z) return;
  if(!pendingAttachments.length){ z.style.display = "none"; z.innerHTML = ""; return; }
  z.style.display = "flex";
  z.innerHTML = pendingAttachments.map(function(a, i){
    var sz = a.size ? (a.size/1048576 >= 1 ? (a.size/1048576).toFixed(1)+"M" : Math.round(a.size/1024)+"K") : "";
    var tag = a.kind === "image" ? "🖼" : (a.kind === "binary" ? "📦" : "📄");
    return '<span class="atchip">'+tag+' '+esc(a.name)+(sz?(" "+sz):"")+' <b onclick="removeAtt('+i+')">×</b></span>';
  }).join("");
}
function removeAtt(i){ pendingAttachments.splice(i, 1); renderAttachZone(); }
document.getElementById("fileInput").addEventListener("change", function(e){
  var files = e.target.files;
  if(!files || !files.length) return;
  for(var i = 0; i < files.length; i++){
    (function(f){
      /* F28 文件校验：大小上限 + 类型白名单，超限直接跳过不进附件区 */
      var MAX = 50 * 1024 * 1024;
      if(f.size > MAX){ toast("「"+f.name+"」超过 " + (MAX/1048576) + "MB，已跳过"); return; }
      var ext = (f.name.split(".").pop() || "").toLowerCase();
      var ALLOW = ["jpg","jpeg","png","gif","webp","bmp","heic","heif","avif","txt","md","markdown","csv","json","xml","log","yml","yaml","ini","conf","js","ts","jsx","tsx","py","java","c","cpp","h","hpp","cs","go","rb","php","sh","bat","ps1","html","htm","css","scss","sql","tex","srt","vtt","toml","gitignore","env","pdf","doc","docx","xls","xlsx","ppt","pptx","zip","rar","7z","tar","gz","mp3","mp4","wav","mov","avi","mkv","flac","aac","m4a","webm"];
      if(ALLOW.indexOf(ext) < 0){ toast("「"+f.name+"」类型暂不支持，已跳过"); return; }
      var kind = fileKind(f);
      if(kind === "text"){
        var rd = new FileReader();
        rd.onload = function(){
          pendingAttachments.push({ id: uid(), name: f.name, mime: f.type || "text/plain", kind: "text", content: String(rd.result || ""), size: f.size });
          renderAttachZone();
        };
        rd.readAsText(f);
      } else if(kind === "image"){
        var rd2 = new FileReader();
        rd2.onload = function(){
          var b64 = rd2.result;
          var ext = (f.type||"image/jpeg").split("/")[1]||"jpg";
          pendingAttachments.push({ id: uid(), name: f.name, mime: f.type || "image", kind: "image", url: persistPickedImage(b64, ext), base64: b64, size: f.size });
          renderAttachZone();
        };
        rd2.readAsDataURL(f);
      } else {
        pendingAttachments.push({ id: uid(), name: f.name, mime: f.type || "未知", kind: "binary", size: f.size, fileRef: f });
        renderAttachZone();
      }
    })(files[i]);
  }
  e.target.value = "";
  toast("已添加 " + files.length + " 个文件" + (files.length > 1 ? "（多图将作为图生图 / 视频参考图）" : ""));
});

/* 用 <script> 注入方式加载更新文件，绕过 GitHub Pages 等不返回 CORS 头的限制（fetch 会被跨域拦截） */
function loadScript(url, ms){
  return new Promise(function(res, rej){
    var s = document.createElement("script");
    var done = false;
    var to = setTimeout(function(){ if(!done){ done=true; s.parentNode && s.parentNode.removeChild(s); rej(new Error("加载超时")); } }, ms||15000);
    s.onload = function(){ if(!done){ done=true; clearTimeout(to); res(); } };
    s.onerror = function(){ if(!done){ done=true; clearTimeout(to); rej(new Error("加载失败（地址不可达/被墙）")); } };
    s.src = url;
    document.head.appendChild(s);
  });
}
/* 游戏式 APK 大更新：拉 apk-version.json，比对当前 APK 的 versionCode，
   返回 json（有新版本）或 false（无/异常）。供 checkUpdate/silentCheckUpdate 调用。 */
/* 统一更新清单：拉 apk-version.json（单一真源，携带 APK 与 web 版本），
   返回 {versionCode,versionName,apkUrl,note,webVersion,webNote}（新版）
   或旧版 {version,note}（version.js 兜底）。供 checkUpdate/silentCheckUpdate 共用，
   消除「APK 与 web 双文件双分支」。 */
function readUpdate(){
  return new Promise(function(resolve){
    var base = updateBaseUrl();
    if(!base){ resolve(null); return; }
    var url = base + "/apk-version.json?t=" + Date.now();
    nativeFetch(url, {method:"GET"})
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(j){
        if(j && (j.versionCode || j.webVersion || j.version)){ resolve(j); return; }
        // 清单缺失/异常：兜底用 version.js（旧格式 {version,note}）
        loadScript(base+"/version.js?t="+Date.now(), 12000)
          .then(function(){ resolve(window.__PA_VER__ || null); })
          .catch(function(){ resolve(null); });
      })
      .catch(function(){
        loadScript(base+"/version.js?t="+Date.now(), 12000)
          .then(function(){ resolve(window.__PA_VER__ || null); })
          .catch(function(){ resolve(null); });
      });
  });
}
/* 从统一清单解析 APK / web 是否可更新（两路共用，避免重复逻辑） */
function evalUpdate(j){
  var curCode = window.__PA_APK_CODE__;
  var hasCode = (typeof curCode === "number") && !isNaN(curCode);
  var apkNewer = j.versionCode ? (hasCode ? (j.versionCode > curCode)
      : (j.versionName && compareVer(j.versionName, APP_VERSION) > 0)) : false;
  var webVer = j.webVersion || j.version;
  var webNote = j.webNote || j.note || "";
  var webNewer = !!(webVer && compareVer(webVer, APP_VERSION) > 0);
  return { apkNewer: apkNewer, webVer: webVer, webNote: webNote, webNewer: webNewer,
           apkName: j.versionName, apkNote: j.note, apkUrl: j.apkUrl };
}

function checkUpdate(){
  var base = updateBaseUrl();
  if(!base){ toast("请先在「关于 → 检查更新地址」填写更新地址"); return; }
  toast("正在检查更新…");
  // 统一检查：APK 大更新优先，其次 web 静默热更（同一清单、同一函数）
  readUpdate().then(function(j){
    if(!j){ toast("检查更新失败（确认地址可访问）"); return; }
    var u = evalUpdate(j);
    if(u.apkNewer){
      showConfirm("发现新版本 v"+u.apkName+"（完整更新）",
        (u.apkNote||"有新版安装包可用")+" 将下载并安装新安装包（此更新需重新安装 App）。",
        function(){
          if(!hasNative() || !window.NativeBridge || !window.NativeBridge.downloadAndInstallApk){ toast("当前环境不支持 APK 安装，请在手机 App 内更新"); return; }
          toast("已发起下载，请稍候（进度与结果由系统提示）");
          NativeBridge.downloadAndInstallApk(u.apkUrl);
        });
      return;
    }
    if(u.webNewer){
      showConfirm("发现新版本 v"+u.webVer, (u.webNote||"有新版可用")+"（点击更新将下载并立即应用，无需重装）", function(){
        doInstallUpdate(base);
      });
      return;
    }
    toast("当前已是最新版 v"+APP_VERSION);
  });
}
function doInstallUpdate(base){
  toast("正在下载更新…");
  loadScript(base+"/app.js?t="+Date.now(), 30000)
    .then(function(){
      var html = window.__PA_APPHtml__;
      if(!html || html.length < 500) throw new Error("下载到的网页内容异常");
      if(!hasNative()){
        window.open(base+"/index.html", "_blank");
        toast("当前为浏览器预览，请在手机 App 内更新");
        return;
      }
      var r = NativeBridge.installUpdate(html);
      if(r && r.indexOf("err:")===0) throw new Error(r.slice(4));
      toast("更新完成，正在重启…");
    })
    .catch(function(e){
      toast("更新失败："+(e&&e.message||e)+"（点「检查更新」可重试）");
    });
}
/* 启动静默检查：有新版本仅提示，不自动下载（避免误耗流量） */
function silentCheckUpdate(){
  var base = updateBaseUrl();
  if(!base) return;
  // 统一检查：APK 大更新优先，其次 web 静默热更
  readUpdate().then(function(j){
    if(!j) return;
    var u = evalUpdate(j);
    if(u.apkNewer){ toast("发现新版本 v"+u.apkName+"（完整更新）：去 设置 → 检查更新 升级"); return; }
    if(u.webNewer){ toast("发现新版本 v"+u.webVer+"：去 设置 → 检查更新 升级"); }
  });
}

    var name = "phone-agent-聊天备份-"+new Date().toISOString().slice(0,10)+".json";

    var url = URL.createObjectURL(blob);

    setTimeout(function(){ try{ URL.revokeObjectURL(url); }catch(e){} }, 1500);

function fetchUpstreamModels(){
  var rawBase = (document.getElementById("aeBase").value.trim()||"https://apihub.agnes-ai.com/v1");
  var key = document.getElementById("aeKey").value.trim();
  if(!key){ toast("请先填写 API Key 再获取"); return; }
  toast("正在从上游获取模型…");

  var url = rawBase.replace(/\/+$/,'') + "/models";
  fetchTimeout(url, {headers:{"Authorization":"Bearer "+key}}).then(function(r){
    if(!r.ok){
      if(r.status===401||r.status===403) throw new Error("鉴权失败(401/403)，Key 可能无效");
      if(r.status===404) throw new Error("接口未找到(404)，请确认请求地址填到 /models 所在前缀");
      throw new Error("HTTP "+r.status);
    }
    return r.json();
  }).then(function(j){
    var list = [];
    if(j && Array.isArray(j.data)) list = j.data.map(function(m){return m.id;}).filter(Boolean);
    else if(Array.isArray(j)) list = j.map(function(m){return (m&&m.id)||m;}).filter(Boolean);
    if(!list.length) throw new Error("上游未返回模型列表");
    API_EDIT_FETCHED = list;
    rebuildModelSelects();
    toast("已获取 "+list.length+" 个模型");
  }).catch(function(e){
    var msg = e && e.message ? e.message : "";
    if(msg.indexOf("Failed to fetch")>=0 || msg.indexOf("NetworkError")>=0) msg = "网络/跨域被拦截（确认地址是 https 且可达）";
    toast("获取失败："+msg+"（可手动填模型名）");

function friendlyErr(err){
  var m = (err && err.message) || String(err);
  // 超时（F17：与「网络不通」区分开）
  if(/超时|TimeoutError|timeout/i.test(m)) return "请求超时（服务响应太慢或网络卡顿）：请检查网络，稍后重试";
  // 网络不通 / 跨域被拦截（浏览器 fetch 失败时只有 Failed to fetch，无 HTTP 状态码）
  if(/Failed to fetch|NetworkError|net::|Load failed|TypeError/i.test(m) && !/HTTP \d/.test(m)){
    var net = (typeof navigator!=="undefined" && navigator.onLine===false) ? "（当前网络似乎已断开）" : "";
    return "网络/跨域被拦截"+net+"：请确认本机网络通畅、请求地址是 https 且可达";
  }
  // 鉴权失败
  if(/401|403|Unauthorized|Forbidden/i.test(m)) return "API Key 无效或无权访问，请到设置检查接口 Key";
  // 频率限制
  if(/429|Too Many|rate/i.test(m)) return "请求太频繁（429），当前供应商可能触发免费档限流，请稍后重试或到「设置 → API 接口」切换其他接口";
  // 服务端 5xx 细分
  var sm = m.match(/HTTP (5\d\d)/);
  if(sm){
    var code = sm[1];
    if(code==="503") return "服务端返回 503（服务/网关临时不可用），请稍后重试";
    if(code==="502") return "服务端返回 502（网关错误），请稍后重试";
    if(code==="504") return "服务端返回 504（网关超时），请稍后重试";
    return "服务端返回 "+code+"，请稍后重试";
  }
  // 其他 4xx
  var s4 = m.match(/HTTP (4\d\d)/);
  if(s4) return "请求被拒绝("+s4[1]+")，请检查接口地址或参数";
  return m.slice(0,80);
}
